name: Deploy Droplet Plugins

# Auto-deploys the Paperclip plugins on push to main when any plugin source
# changes. Companion to deploy-droplet.yml (which handles vault-server).
#
# CHEAP PATH (worker code changes): git-pull the repo + rebuild the dists in
# place. Paperclip's plugin-dev-watcher HOT-RELOADS each worker whose dist/
# changed — no restart, no manual step.
#
# MANIFEST CHANGES (new capability / config field / database / webhook / version
# bump): the hot-reload refreshes worker CODE but NOT the stored registry
# version. Left unfinished, the registry stays pinned to the OLD version and a
# fresh install/worker keeps serving the previous code path even though main and
# dist/ are already new — a silent stale-worker trap that cost two full
# investigations (GOL-717, GOL-727).
#
# This workflow now FINISHES that itself (GOL-733): scripts/detect-manifest-bumps.sh
# flags each plugin whose packages/<p>/src/manifest.ts changed, and the
# "Finish manifest bumps" step below calls the idempotent, zero-downtime
# POST /api/plugins/<id>/upgrade (safe from `ready`) on the droplet to converge
# the stored registry version + reload the worker. The board key is read ON THE
# BOX from 1Password via the credential-broker OP service-account token (GOL-313
# pattern) — never a GitHub Actions secret (this repo has no CI secrets:write).
# scripts/deploy-plugin.sh (Mac) remains the fallback for the rarer case that
# needs a full reinstall+config (a brand-new plugin / new bind mount, which also
# needs the "Recreate paperclip-server" workflow). See
# docs/runbooks/deploy-plugin-manifest-change.md.
#
# Convention: bump `version:` in the manifest on every manifest change. (CI
# detects by whole-file diff, so a forgotten bump is still caught.)

on:
  push:
    branches: [main]
    paths:
      - 'packages/vault-plugin/**'
      - 'packages/openviking-plugin/**'
      - 'packages/github-plugin/**'
      - 'packages/github-sync-plugin/**'
      - '.github/workflows/deploy-droplet-plugins.yml'
  workflow_dispatch:

permissions:
  contents: read

# Share the Droplet deploy lock with deploy-droplet.yml so a plugin deploy and
# a vault-server deploy never run docker/git on the box at the same time.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy plugins
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out composite actions
        uses: actions/checkout@v7
        with:
          sparse-checkout: .github/actions

      - name: Configure SSH
        uses: ./.github/actions/configure-ssh
        with:
          deploy-key: ${{ secrets.DROPLET_SSH_KEY }}
          host: ${{ secrets.DROPLET_HOST }}

      - name: Pull repo + rebuild plugin dists (hot-reloads workers)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # bash -lc → login shell so pnpm/node are on PATH.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" 'bash -lc '"'"'
            set -euo pipefail

            # Self-heal the packages symlink (stale REAL dir shadows the repo).
            if [ -e /opt/agenticos/packages ] && [ ! -L /opt/agenticos/packages ]; then
              rm -rf /opt/agenticos/packages
            fi
            ln -sfn /opt/agenticos/repo/packages /opt/agenticos/packages

            cd /opt/agenticos/repo
            OLD="$(git rev-parse HEAD)"
            git fetch --quiet origin main
            git checkout --quiet main
            git reset --hard --quiet origin/main

            pnpm install --frozen-lockfile \
              --filter @agenticos/vault-plugin \
              --filter @agenticos/openviking-plugin \
              --filter @agenticos/github-plugin \
              --filter @agenticos/github-sync-plugin
            pnpm --filter @agenticos/vault-plugin \
                 --filter @agenticos/openviking-plugin \
                 --filter @agenticos/github-plugin \
                 --filter @agenticos/github-sync-plugin build

            # Fail the deploy if any dist is incomplete (worker + manifest).
            for p in vault-plugin openviking-plugin github-plugin github-sync-plugin; do
              for f in dist/worker.js dist/manifest.js; do
                test -s "packages/$p/$f" || { echo "MISSING packages/$p/$f"; exit 1; }
              done
              echo "ok: $p"
            done

            echo "=== manifest bump detection ==="
            bash scripts/detect-manifest-bumps.sh "$OLD" HEAD
          '"'"'' | tee deploy.log

      - name: Detect manifest changes
        if: always()
        run: |
          # `always()` also fires when the deploy was skipped or failed, and
          # then deploy.log doesn't exist. `grep || true` can't tell "no
          # matches" from "no file", so both landed in the else branch below
          # and the summary claimed workers had hot-reloaded on a run that
          # never reached the droplet (run 29422894878). Say so instead.
          # bumps.txt is the gate the "Finish manifest bumps" step reads.
          if [ ! -f deploy.log ]; then
            echo "⚠️ The deploy step did not run, so there is no manifest state to report. Check the failed step above." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          grep "^MANIFEST_BUMP:" deploy.log > bumps.txt || true
          if [ -s bumps.txt ]; then
            echo "### Manifest bump detected — auto-finishing via \`/upgrade\`" >> "$GITHUB_STEP_SUMMARY"
            while read -r _ plugin; do
              echo "- **${plugin}** — worker code hot-reloaded; the next step converges the stored registry version via the idempotent plugin \`/upgrade\` (GOL-733)." >> "$GITHUB_STEP_SUMMARY"
            done < bumps.txt
          else
            echo "No manifest changes — workers hot-reloaded (cheap path)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Finish manifest bumps — auto plugin /upgrade (GOL-733)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # Fires ONLY when a manifest actually changed (bumps.txt, prev step).
          # Converges the STORED plugin-registry version with the freshly-built
          # dist by calling the idempotent POST /api/plugins/<id>/upgrade on the
          # droplet, so the running worker never keeps executing the previous
          # code path while main + dist are already the new version (GOL-717/727).
          # The board key is read on the box from 1Password via the credential-
          # broker OP service-account token (GOL-313) — never a GH Actions secret.
          # Default shell is `bash -eo pipefail`, so a non-zero exit from the
          # finish script (registry did NOT converge) fails this step RED instead
          # of leaving the stale worker to be discovered later.
          if [ ! -s bumps.txt ]; then
            echo "No manifest bumps — nothing to finish (workers hot-reloaded)."
            echo "No manifest bumps to finish." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          plugins="$(awk '{print $2}' bumps.txt | tr '\n' ' ')"
          echo "Finishing manifest bump(s): ${plugins}"
          # `bash -lc` so node is on PATH; the finish script is in the deployed
          # checkout (the deploy step already reset /opt/agenticos/repo to main).
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
            "bash -lc 'set -euo pipefail; cd /opt/agenticos/repo && bash scripts/finish-plugin-upgrade.sh ${plugins}'" \
            | tee upgrade.log
          {
            echo "### ✅ Manifest bump finished via \`/upgrade\`"
            echo '```'
            grep -E '^\{|converged|^== |paperclip API:' upgrade.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Confirm workers hot-reloaded
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # The dev-watcher logs a worker restart per changed plugin. Give it a
          # moment, then check the recent paperclip-server logs. Non-fatal: a
          # no-op deploy (dist unchanged) legitimately logs nothing.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" '
            sleep 5
            cd /opt/agenticos
            if docker compose logs --since 60s paperclip-server 2>/dev/null \
                 | grep -qiE "plugin-dev-watcher|restarting worker|loaded tools"; then
              echo "workers reloaded"
            else
              echo "no reload log in the last 60s (ok if dists were unchanged)"
            fi
            docker compose ps paperclip-server'
