name: Deploy Droplet Plugins

# Auto-deploys the Paperclip plugins (vault / openviking / github) on push to
# main when any plugin source changes. Companion to deploy-droplet.yml, which
# handles vault-server. Until now plugin changes were deployed by hand.
#
# Deploy mechanism differs from vault-server's tar+image-build: the plugins'
# compose mounts resolve through the `packages` symlink into the git checkout
# at /opt/agenticos/repo, and Paperclip's plugin-dev-watcher HOT-RELOADS a
# worker whenever its dist/ changes. So the deploy is: git pull the repo, build
# the three dists in place — the running workers reload with no restart.
#
# Caveats (intentional, see the README/runbook):
#   - Manifest changes (new config field / capability) need a reinstall, which
#     the dev-watcher does NOT do (it refreshes worker code, not the stored
#     manifest). Run scripts/sync-paperclip-secrets.sh for those — rare.
#   - Secrets/config never flow through CI. Tokens live in 1Password and are
#     pushed once via the sync script.

on:
  push:
    branches: [main]
    paths:
      - 'packages/vault-plugin/**'
      - 'packages/openviking-plugin/**'
      - 'packages/github-plugin/**'
      - 'packages/github-sync-plugin/**'
      - '.github/workflows/deploy-droplet-plugins.yml'
  workflow_dispatch:

permissions:
  contents: read

# Share the Droplet deploy lock with deploy-droplet.yml so a plugin deploy and
# a vault-server deploy never run docker/git on the box at the same time.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy plugins
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull repo + rebuild plugin dists (hot-reloads workers)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # bash -lc → login shell so pnpm/node are on PATH (the plain ssh
          # non-interactive shell would not source the profile that sets them).
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" 'bash -lc '"'"'
            set -euo pipefail

            # Self-heal the packages symlink: a stale REAL dir would shadow the
            # repo checkout and silently deploy old code (the known drift bug).
            if [ -e /opt/agenticos/packages ] && [ ! -L /opt/agenticos/packages ]; then
              rm -rf /opt/agenticos/packages
            fi
            ln -sfn /opt/agenticos/repo/packages /opt/agenticos/packages

            cd /opt/agenticos/repo
            git fetch --quiet origin main
            git checkout --quiet main
            git reset --hard --quiet origin/main

            pnpm install --frozen-lockfile \
              --filter @agenticos/vault-plugin \
              --filter @agenticos/openviking-plugin \
              --filter @agenticos/github-plugin \
              --filter @agenticos/github-sync-plugin
            pnpm --filter @agenticos/vault-plugin \
                 --filter @agenticos/openviking-plugin \
                 --filter @agenticos/github-plugin \
                 --filter @agenticos/github-sync-plugin build

            # Fail the deploy if any dist is incomplete (worker + manifest).
            for p in vault-plugin openviking-plugin github-plugin github-sync-plugin; do
              for f in dist/worker.js dist/manifest.js; do
                test -s "packages/$p/$f" || { echo "MISSING packages/$p/$f"; exit 1; }
              done
              echo "ok: $p"
            done
          '"'"''

      - name: Confirm workers hot-reloaded
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # The dev-watcher logs a worker restart per changed plugin. Give it a
          # moment, then check the recent paperclip-server logs. Non-fatal: a
          # no-op deploy (dist unchanged) legitimately logs nothing.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" '
            sleep 5
            cd /opt/agenticos
            if docker compose logs --since 60s paperclip-server 2>/dev/null \
                 | grep -qiE "plugin-dev-watcher|restarting worker|loaded tools"; then
              echo "workers reloaded"
            else
              echo "no reload log in the last 60s (ok if dists were unchanged)"
            fi
            docker compose ps paperclip-server'
