# Bounded mechanical self-heal for agent PRs (GOL-308, from approved GOL-303).
#
# Applies eslint --fix + vitest snapshot updates to an agent PR and pushes ONE
# fix commit; non-mechanical failures leave no diff and stay red for the D3 CI
# failure router (ci-failure-router.yml, E1). See grove-sites ci-autofix.yml
# for the full rationale, the `pull_request` (not `workflow_run`) security
# reasoning, and the GITHUB_TOKEN re-trigger limitation (identical here).
#
# Guardrails: same-repo agent-authored PRs only; one autofix commit per push
# (skips if the head commit is already a "[ci-autofix]" commit); no-op if the
# fixers leave no diff. Node steps no-op until the monorepo is bootstrapped.
name: CI autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ci-autofix-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  autofix:
    # Same-repo only — fork code never runs with a write-scoped token.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Gate (agent author + loop guard)
        id: gate
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          case "$AUTHOR" in
            agenticos-developer|agenticos-developer[bot]|app/agenticos-developer) ;;
            *)
              echo "PR author '$AUTHOR' is not the agent App bot; skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          LAST_MSG=$(git log -1 --pretty=%s)
          if printf '%s' "$LAST_MSG" | grep -q '\[ci-autofix\]'; then
            echo "Head commit is already a [ci-autofix] commit; skipping to prevent loops."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.gate.outputs.proceed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm

      - name: Apply mechanical fixes (eslint --fix + vitest snapshot update)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json yet (Phase 0) — nothing to autofix."
            exit 0
          fi
          pnpm install --frozen-lockfile
          pnpm -w lint -- --fix || true
          pnpm -w test -- -u || true

      - name: Commit & push one fix commit (or skip if clean)
        if: steps.gate.outputs.proceed == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No mechanical fixes to apply — non-mechanical failure, leaving for the CI failure router (E1)."
            exit 0
          fi
          git commit \
            -m "chore(ci): apply mechanical lint/format/snapshot fixes [ci-autofix]" \
            -m "Automated bounded self-heal for an agent PR. One commit per push (GOL-308)." \
            -m "Co-authored-by: Paperclip <noreply@paperclip.ing>"
          git push origin "HEAD:$HEAD_REF"
          echo "::notice::Pushed one [ci-autofix] commit to $HEAD_REF. NOTE: GITHUB_TOKEN pushes do not re-trigger pull_request checks — the next agent push or a maintainer 'Re-run' will re-validate."
