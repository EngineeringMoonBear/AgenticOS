name: CI

# Lint, typecheck, unit-test, and build the monorepo on every PR to main and
# every push to main. Jobs are gated on the presence of `package.json` so this
# workflow is a no-op while the repo is in Phase 0 and activates automatically
# the moment Task 1 (`Bootstrap monorepo`) lands.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  setup:
    name: Detect monorepo
    runs-on: ubuntu-latest
    outputs:
      has_package_json: ${{ steps.check.outputs.has_package_json }}
      has_hermes_pkg: ${{ steps.check.outputs.has_hermes_pkg }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json yet — Node CI jobs will skip until Task 1 merges."
          fi
          if [ -f packages/agenticos-hermes/pyproject.toml ]; then
            echo "has_hermes_pkg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_hermes_pkg=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python package yet — pytest will skip until Spec 1 Task 9 merges."
          fi

  lint:
    name: Lint
    needs: setup
    if: needs.setup.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w lint

  typecheck:
    name: Typecheck
    needs: setup
    if: needs.setup.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w typecheck

  test:
    name: Unit tests
    needs: [setup, lint, typecheck]
    if: needs.setup.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w test

  build:
    name: Build
    needs: [setup, lint, typecheck]
    if: needs.setup.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w build

  pytest:
    name: Pytest (agenticos-hermes)
    needs: setup
    if: needs.setup.outputs.has_hermes_pkg == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install hermes plugin package + dev deps
        working-directory: packages/agenticos-hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run pytest
        working-directory: packages/agenticos-hermes
        run: pytest -v
