name: Deploy Droplet

# Auto-deploys the Droplet-side vault-server on push to main when its source
# or the root docker-compose.yml changes. App Platform already auto-deploys the
# dashboard; this closes the gap for the stateful Droplet services, which until
# now were deployed by hand.
#
# Deploy mechanism mirrors the proven manual reconcile: ship the committed tree
# with `git archive | ssh tar` (extract is additive, so Droplet-only files like
# .env are preserved), then rebuild + restart only the changed service.
# /opt/agenticos is an rsync/tarball snapshot, NOT a git checkout — so we do not
# `git pull` on the Droplet.

on:
  push:
    branches: [main]
    paths:
      - 'infra/vault-server/**'
      - 'packages/vault-core/**'
      - 'packages/vault-plugin/**'
      - 'packages/openviking-plugin/**'
      - 'packages/github-plugin/**'
      - 'scripts/agent-git/**'
      - 'docs/agent-house-rules.md'
      - 'docker-compose.yml'
      - 'infra/otel/**'
      - '.github/workflows/deploy-droplet.yml'
  workflow_dispatch:

permissions:
  contents: read

# Never run two Droplet deploys at once; let an in-flight deploy finish rather
# than cancelling it mid-rebuild.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Droplet services
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship committed tree to Droplet
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # Additive tar extract: overwrites tracked files, never deletes
          # Droplet-only files (.env). Untracked WIP can't leak because git
          # archive emits only the committed tree.
          git archive --format=tar HEAD | gzip | \
            ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
              'tar xzf - -C /opt/agenticos && echo synced'

      # GOL-238: the 4G swap safety-net lives in cloud-init, but that only runs on
      # a fresh droplet build. This box (created 2026-05-21) predates that change,
      # so /swapfile was never created and the OOM-killer fired at 91.8% RAM on
      # 2026-07-10 11:16Z, taking down a UI-backing container. The container
      # mem_limits sum to ~7.4G on a 4G box (intentional overcommit), so swap is
      # load-bearing. Ensure it on the LIVE host here, idempotently, so the fix
      # ships with zero new access and self-heals on every deploy. Mirrors the
      # cloud-init snippet exactly.
      # GOL-238: the 4G swap safety-net lives in cloud-init, which only runs on a
      # droplet build; this box (created 2026-05-21) predates it, so /swapfile was
      # never created and the OOM-killer fired at 91.8% RAM on 2026-07-10 11:16Z,
      # killing a UI-backing container. The deploy user has no passwordless sudo
      # but is in the docker group, so run the committed ensure-swap.sh in a
      # privileged one-shot container (docker-group == host root). swapon/sysctl
      # are global kernel ops -> they take effect host-wide. Zero new access;
      # idempotent; self-heals on every deploy. The script was shipped to the host
      # by the "Ship committed tree" step above.
      - name: Ensure swap safety-net (GOL-238)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" '
             docker run --rm --privileged -e HOST=/host -v /:/host alpine:3 \
               sh /host/opt/agenticos/infra/scripts/ensure-swap.sh'

      - name: Rebuild vault-server + reload plugins on paperclip-server
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # `deploy` is in the docker group — no sudo (sudo would block on a
          # password prompt and hang the job).
          #
          # paperclip-server bind-mounts the plugins as prebuilt dist/. A bare
          # restart keeps the old mount inode and can miss freshly-shipped dist,
          # so force-recreate it to re-resolve the mounts and re-run the
          # plugin-loader (otherwise plugins fail to activate with "no longer
          # exposes a Paperclip manifest"). OAuth/login state survives — it's on
          # the paperclip-data volume, not the container layer.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
            'set -euo pipefail
             cd /opt/agenticos
             docker compose build vault-server
             docker compose up -d vault-server
             docker compose up -d --force-recreate paperclip-server
             # cloudflared too, so a shipped change to the tunnel service (or its
             # first rollout) is actually applied — `up -d` recreates only if its
             # config changed. The connector dials out, so this never interrupts
             # inbound traffic.
             docker compose up -d cloudflared
             docker compose ps vault-server paperclip-server cloudflared'

      # GOL-313: seed the obs-droplet ingest config into the Droplet-only .env so the
      # conditional reconcile step below can bring the otel-collector up. /opt/agenticos/.env
      # is NOT CI-managed (the deploy only reads it), so we write the three OPENOBSERVE_*
      # vars in-architecture from the on-box credential-broker OP service-account token —
      # no obs creds ever enter GitHub secrets. The OTLP base is non-secret; the two root
      # creds are read at deploy time via a pinned `op` container using that on-box token
      # (verified read-scoped to Grove Infra/obs_openobserve_root_*). Fully idempotent and
      # fail-safe: if the broker token or creds are absent, it logs and leaves the collector
      # disabled rather than failing the deploy.
      - name: Seed OpenObserve obs config into .env (GOL-313)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
          # Non-secret obs-droplet OTLP-HTTP base. Override via repo variable if the obs
          # endpoint moves; otherwise defaults to the live grove-obs droplet.
          OTLP_BASE: ${{ vars.OPENOBSERVE_OTLP_BASE || 'http://159.65.46.198:5080/api/default' }}
        run: |
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" "OTLP_BASE='${OTLP_BASE}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/agenticos
          ENV_FILE=.env
          BROKER_ENV=secrets/credential-broker.env
          OP_IMG=1password/op:2

          : "${OTLP_BASE:?GOL-313: OTLP_BASE not provided}"

          if [ ! -f "$BROKER_ENV" ]; then
            echo "GOL-313: $BROKER_ENV absent (credential-broker OP token not provisioned) — leaving otel-collector disabled."
            exit 0
          fi

          # Extract + de-quote the read-only OP service-account token the broker already holds.
          OP_TOKEN=$(grep -E '^OP_SERVICE_ACCOUNT_TOKEN=' "$BROKER_ENV" | head -n1 | cut -d= -f2-)
          OP_TOKEN="${OP_TOKEN%\"}"; OP_TOKEN="${OP_TOKEN#\"}"
          OP_TOKEN="${OP_TOKEN%\'}"; OP_TOKEN="${OP_TOKEN#\'}"
          if [ -z "${OP_TOKEN:-}" ]; then
            echo "GOL-313: OP_SERVICE_ACCOUNT_TOKEN empty in $BROKER_ENV — leaving otel-collector disabled."
            exit 0
          fi

          # Box has no op CLI; read via a pinned op container. --entrypoint op is deterministic
          # regardless of the image default entrypoint. Never fail the deploy on a read error.
          op_read() {
            docker run --rm --entrypoint op -e OP_SERVICE_ACCOUNT_TOKEN="$OP_TOKEN" "$OP_IMG" read "$1" 2>/dev/null || true
          }
          OO_EMAIL=$(op_read "op://Goldberry Grove - Admin/Grove Infra/obs_openobserve_root_email")
          OO_PW=$(op_read "op://Goldberry Grove - Admin/Grove Infra/obs_openobserve_root_password")
          if [ -z "$OO_EMAIL" ] || [ -z "$OO_PW" ]; then
            echo "GOL-313: obs root creds did not resolve from 1Password — leaving otel-collector disabled."
            exit 0
          fi

          # Atomic all-or-nothing upsert of the three keys (so the reconcile gate never sees a
          # base without creds). Rebuild the file instead of sed so arbitrary password bytes are
          # never interpreted. .env stays chmod 600.
          umask 077
          tmp=$(mktemp)
          [ -f "$ENV_FILE" ] && grep -vE '^(OPENOBSERVE_OTLP_BASE|OPENOBSERVE_ROOT_EMAIL|OPENOBSERVE_ROOT_PASSWORD)=' "$ENV_FILE" > "$tmp" || true
          {
            printf 'OPENOBSERVE_OTLP_BASE=%s\n' "$OTLP_BASE"
            printf 'OPENOBSERVE_ROOT_EMAIL=%s\n' "$OO_EMAIL"
            printf 'OPENOBSERVE_ROOT_PASSWORD=%s\n' "$OO_PW"
          } >> "$tmp"
          chmod 600 "$tmp"
          mv "$tmp" "$ENV_FILE"
          echo "GOL-313: seeded OPENOBSERVE_* into $ENV_FILE (base=$OTLP_BASE; root email + password set)."
          REMOTE

      - name: Reconcile otel-collector (GOL-54, conditional)
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # The otel-collector is behind the `observability` compose profile, so it starts ONLY
          # where the obs endpoint is configured. Gate on OPENOBSERVE_OTLP_BASE being present in
          # /opt/agenticos/.env — otherwise the collector would crash-loop exporting to an unset
          # endpoint. Once the obs-droplet ingest URL + creds are set in .env, this brings the
          # collector up (and applies config changes shipped via infra/otel/**). Purely additive:
          # never touches the stateful services above.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" '
            set -euo pipefail
            cd /opt/agenticos
            if grep -q "^OPENOBSERVE_OTLP_BASE=." .env 2>/dev/null; then
              # --force-recreate so shipped changes to the bind-mounted collector config
              # (infra/otel/otelcol-agenticos.yaml) actually take effect. A plain `up -d`
              # only recreates on a compose-config-hash change (image/env/volumes); a change
              # to the CONTENTS of a mounted file does not, so otelcol — which reads its
              # config only at startup — would keep running the stale config. Since
              # infra/otel/** is a deploy trigger path specifically to ship this config,
              # recreate on every reconcile. The collector is stateless, so recreation is a
              # ~1s metrics gap, never a data-loss risk (GOL-313).
              docker compose --profile observability up -d --force-recreate otel-collector
              docker compose ps otel-collector
            else
              echo "otel-collector not enabled (OPENOBSERVE_OTLP_BASE unset in .env); skipping — GOL-54"
            fi'

      - name: Health check
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          # vault-server is published on the VPC IP 10.116.16.2:7779 (NOT the
          # unreachable eth0 10.10.0.5). Checked from inside the Droplet, where
          # the VPC interface is reachable. Retry briefly while it boots.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" '
            for i in 1 2 3 4 5; do
              if curl -fsS --max-time 5 http://10.116.16.2:7779/health | grep -q "\"ok\":true"; then
                echo "vault-server healthy"; exit 0
              fi
              echo "waiting for vault-server ($i)..."; sleep 3
            done
            echo "vault-server did not report healthy"; exit 1'
