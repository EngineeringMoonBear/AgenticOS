# Scheduled/on-demand CI secret sync (GOL-342).
#
# Runs tools/sync-ci-secrets.sh from infra/ci-secrets.yaml so secrets converge
# without a human copy-paste. The ONLY bootstrap secret this needs is a
# 1Password service-account token (OP_SERVICE_ACCOUNT_TOKEN); everything else is
# read from 1Password at run time.
#
# ⚠️ INERT UNTIL SECRETS EXIST. As of 2026-07-13 no token has secrets:WRITE on
# this repo (the shared App is read-only here — see tools/README.md), so:
#   • OP_SERVICE_ACCOUNT_TOKEN cannot yet be set on this repo programmatically, and
#   • a GH_TOKEN write-scoped for the *target* repos must be provided.
# This workflow is therefore manual-dispatch only (no cron) and no-ops with a
# clear message if OP_SERVICE_ACCOUNT_TOKEN is absent. Add the bootstrap secret +
# uncomment the schedule to make it self-driving.
name: sync-ci-secrets

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Only sync entries for this owner/name (blank = all in manifest)"
        required: false
        default: ""
      dry_run:
        description: "Preview without writing"
        type: boolean
        default: true
  # schedule:
  #   - cron: "17 6 * * 1"   # weekly Mon 06:17 UTC — enable once secrets exist

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — bootstrap secret present
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "::warning::OP_SERVICE_ACCOUNT_TOKEN not set — nothing to do (see tools/README.md)."
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Install 1Password CLI
        if: env.skip != '1'
        uses: 1password/install-cli-action@v1

      - name: Sync secrets
        if: env.skip != '1'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Write-scoped token for the TARGET repos (e.g. the Grove Infra PAT for
          # grove-sites). Distinct from GITHUB_TOKEN, which cannot write another repo.
          GH_TOKEN: ${{ secrets.CI_SECRETS_WRITE_TOKEN }}
        run: |
          args=""
          [ -n "${{ inputs.repo }}" ] && args="$args --repo ${{ inputs.repo }}"
          [ "${{ inputs.dry_run }}" = "true" ] && args="$args --dry-run"
          chmod +x tools/sync-ci-secrets.sh
          tools/sync-ci-secrets.sh $args
