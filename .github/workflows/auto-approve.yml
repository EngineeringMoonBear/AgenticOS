# Agent-mergeable path for AgenticOS (GOL-308 port of grove-sites GOL-122).
#
# Every Paperclip agent authors PRs under the SAME GitHub App bot
# (agenticos-developer[bot]). This workflow submits an approving review as
# `github-actions[bot]` — a DISTINCT identity from the PR-author App — and
# enables auto-merge once CI is green, so agent PRs merge hands-free.
#
# DIVERGENCE FROM grove-sites:
#   1. Gated on the "CI" workflow (this repo has no "Claude Code Review"
#      agent-review workflow).
#   2. This repo currently has NO active branch-protection ruleset requiring a
#      review (the `ClaudeLimits` ruleset is disabled). So the approval is a
#      no-op for the merge gate today; the value here is auto-merge-on-green.
#      If a review-requiring ruleset is enabled later, this satisfies it
#      automatically with no change. Auto-merge still waits for any required
#      checks before it merges.
#
# Guardrails:
#   - Never auto-approves human or external PRs (author must be the agent App bot).
#   - Never approves unless CI passed.
#   - Runs from the base-branch definition (workflow_run), so a PR cannot modify
#     this file to approve itself.
name: Auto-approve verified agent PRs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    steps:
      - name: Approve (as github-actions[bot]) + enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail

          AUTHOR=$(gh pr view "$PR" --repo "$REPO" --json author -q '.author.login')
          case "$AUTHOR" in
            app/agenticos-developer|agenticos-developer) ;;
            *)
              echo "PR #$PR author '$AUTHOR' is not the agent App bot; skipping (human/external PRs keep human review)."
              exit 0 ;;
          esac

          ALREADY=$(gh api "repos/$REPO/pulls/$PR/reviews" \
            -q '[.[] | select(.user.login=="github-actions[bot]" and .state=="APPROVED")] | length')
          if [ "${ALREADY:-0}" -gt 0 ]; then
            echo "PR #$PR already approved by github-actions[bot]; ensuring auto-merge is on."
          else
            gh pr review "$PR" --repo "$REPO" --approve --body \
              "Auto-approved by github-actions[bot]: CI passed. This identity is distinct from the PR-author App, so it satisfies any review requirement without self-approval. Required status checks still gate the actual merge. (GOL-308, port of GOL-122)"
          fi

          gh pr merge "$PR" --repo "$REPO" --auto --squash \
            || echo "Could not enable auto-merge (needs 'Allow auto-merge' + protection with a required check/review). Approval still stands; merge will be a one-click for a maintainer."
