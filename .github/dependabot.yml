version: 2

# Dependabot keeps third-party action SHAs and npm deps fresh with reviewable
# PRs. Grouped weekly so we get one PR per ecosystem instead of dozens of
# individual bumps. Production npm bumps are restricted to minor/patch — major
# upgrades open as separate PRs because they need human review.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    open-pull-requests-limit: 10
    ignore:
      # React majors land in lockstep with Next.js majors; let the Next bump
      # drag React along instead of fighting two PRs.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # ESLint 10 removed deprecated context APIs (getFilename/getSourceCode)
      # that eslint-plugin-react@7.37.5 (latest) still calls — it peer-pins
      # eslint ^9.7, so the lint job crashes on rule load under v10. Hold the
      # eslint major until the plugin ecosystem ships ESLint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
