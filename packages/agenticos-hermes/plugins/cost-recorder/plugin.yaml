# cost-recorder — AgenticOS cost telemetry plugin for Hermes Agent.
#
# Records every LLM call to the agenticos Postgres DB (tasks/sessions/calls).
#
# Hook signatures verified 2026-05-22 against Hermes 0.14 bundled plugins on
# the Droplet (`docker exec hermes-agent`):
#
#   post_llm_call(*, task_id="", session_id="", provider="", base_url="",
#                 api_mode="", model="", api_call_count=0,
#                 assistant_message=None, response=None, api_duration=0.0,
#                 finish_reason="", usage=None,
#                 assistant_content_chars=0, assistant_tool_call_count=0,
#                 assistant_response=None, **_)
#     -- Reference: /opt/hermes/plugins/observability/langfuse/__init__.py:801
#     -- `usage` dict keys: input_tokens, output_tokens (or completion_tokens),
#        cache_read_tokens, cache_write_tokens, reasoning_tokens
#
#   on_session_end(session_id="", completed=True, interrupted=False, **_)
#     -- Reference: /opt/hermes/plugins/disk-cleanup/__init__.py:_on_session_end
#
# Hermes 0.14 dispatches hooks via a `register(ctx)` entry point that calls
# `ctx.register_hook(name, fn)`. Function names below are arbitrary; the hook
# *names* passed to register_hook are the contract.
name: cost-recorder
version: 1.0.0
description: "AgenticOS cost telemetry — records every LLM call to agenticos-db (tasks/sessions/calls)."
author: AgenticOS
requires_env:
  - AGENTICOS_DB_URL
hooks:
  - post_llm_call
  - on_session_end
