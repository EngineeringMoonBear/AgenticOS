[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenticos-inbox-watcher"
version = "0.1.0"
description = "Standalone daemon that watches /opt/vault/inbox and triggers Hermes inbox-triage."
requires-python = ">=3.11"
dependencies = [
  "watchdog>=4.0",
  "httpx>=0.27",
  "PyYAML>=6.0",
  "psycopg[binary]>=3.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
# Single-module package; ship watcher.py as the wheel payload.
only-include = ["watcher.py"]
