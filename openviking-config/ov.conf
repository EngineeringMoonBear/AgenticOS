{
  "default_account": "agenticos",
  "default_user": "deploy",
  "default_agent": "default",
  "server": {
    "host": "0.0.0.0",
    "port": 1933,
    "workers": 1,
    "cors_origins": ["*"],
    "auth_mode": "api_key",
    "root_api_key": "__OPENVIKING_ROOT_API_KEY__"
  },
  "storage": {
    "workspace": "/app/.openviking/data"
  },
  "embedding": {
    "dense": {
      "provider": "ollama",
      "model": "nomic-embed-text",
      "api_base": "http://ollama:11434/v1"
    }
  },
  "memory": {
    "extraction_enabled": true
  }
}
