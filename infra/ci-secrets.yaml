# ci-secrets.yaml — declarative 1Password → GitHub Actions secret manifest (GOL-342)
#
# ONE source of truth for "which 1Password secret feeds which repo's Actions
# secret". Consumed by BOTH implementations:
#   • tools/sync-ci-secrets.sh        — op read | gh secret set, per entry (any repo)
#   • tools/ci-secrets-tfvars.sh      — emits TF_VAR_ci_secrets JSON for terraform
#                                       (filtered to one repo; AgenticOS drift detection)
#
# ADD A SECRET  = add one entry below, then rerun tools/sync-ci-secrets.sh
#                 (or `terraform apply` for AgenticOS). Idempotent — safe to re-run.
#
# Each entry:
#   op_ref : op://<vault>/<item>/<field>  (1Password reference; value never printed)
#   repo   : owner/name                    (target GitHub repo)
#   name   : SECRET_NAME                   (GitHub Actions secret name)
#   gate   : (optional) free-text reason this row is intentionally NOT synced yet;
#            when present, sync-ci-secrets.sh SKIPS the row and prints the reason
#            instead of attempting a write that would 403.
#
# ── WRITE-CAPABILITY MATRIX (verified by real PUT tests 2026-07-13, GOL-342) ──
#   grove-sites              : Grove Infra PAT has secrets:WRITE  ✅ self-serve NOW
#   EngineeringMoonBear/AgenticOS : App token = READ only (PUT 403); no PAT access ⛔
#   odoocker                 : App not installed (401); no PAT access (404)        ⛔
# Gated rows carry a `gate:` note so the manifest stays honest and re-runnable.

secrets:
  # ── AgenticOS: Tier 2A rightsize advisor (GOL-252) ──────────────────────────
  # GATED: no token has secrets:write on AgenticOS yet (App = read-only). This
  # row is the canonical declaration; unset `gate` (and grant the App
  # Secrets:write, or supply a write PAT) to activate. Terraform is the preferred
  # applier for this repo — see infra/terraform/github-ci-secrets.tf.
  - op_ref: op://Goldberry Grove - Admin/Grove Infra/do_token_scoped
    repo:   EngineeringMoonBear/AgenticOS
    name:   DO_MONITORING_TOKEN
    gate:   "no secrets:write token on AgenticOS yet (App token PUT=403, 2026-07-13); prefer terraform once granted"

  # ── AgenticOS: Tier 2B guarded auto-resize (GOL-254) ────────────────────────
  # DOUBLE-GATED. This write-scoped DO token only ever mutates when the board
  # ALSO (a) opts a droplet in via infra/config/auto-resize.json enabled:true and
  # (b) sets the AUTO_RESIZE_ENABLED Actions secret to "1". Ships dry-run: with
  # AUTO_RESIZE_DO_TOKEN absent the executor falls back to DO_MONITORING_TOKEN
  # (read-only) and can only advise. `gate` stays until the board's D2 opt-in AND
  # a secrets:write path on AgenticOS exist.
  - op_ref: op://Goldberry Grove - Admin/Grove Infra/do_token
    repo:   EngineeringMoonBear/AgenticOS
    name:   AUTO_RESIZE_DO_TOKEN
    gate:   "GOL-254 board D2 opt-in pending + no secrets:write on AgenticOS yet (App PUT=403, 2026-07-13)"
  # AUTO_RESIZE_ENABLED is a board governance toggle set by hand ("1" to arm),
  # NOT a 1Password-sourced value — intentionally not synced here.

  # ── AgenticOS: Grove ops Discord webhook (GOL-666) — RESOLVED, UNGATED ───────
  # The rightsize-advisor + resize-droplet + auto-resize workflows POST notices to
  # this webhook. 1Password is the canonical source; this row makes the CI copy
  # converge to it on every sync and stay self-healing.
  # Root cause of GOL-666 (corrected): NOT a stale post-rotation URL. The repo
  # secret value had been overwritten with the literal single character "-" (smells
  # like `gh secret set DISCORD_WEBHOOK_URL -`, where the "-" stdin flag became the
  # value). Two tells: (1) CI died `ValueError: unknown url type: '***'` in
  # post_discord() — a stale-but-valid URL would 401/404 from Discord, not fail URL
  # parsing; (2) Actions masked the "-" inside the printed traceback filename
  # `rightsize***advisor.py` (real name rightsize-advisor.py) — only possible if the
  # secret's value IS "-". The webhook itself was ALIVE the whole time
  # (grove-ops-webhook, GET 200 + POST 204). Never set placeholder secrets to
  # punctuation: a 1-char secret is a masking oracle and corrupts unrelated logs.
  # Resolved 2026-07-21: Josh set the secret from op (updated_at 18:36:13Z) and
  # granted agenticos-developer Secrets:Read+write. Verified: write-probe PUT → 422
  # (not 403), header x-accepted-github-permissions: secrets=write; re-dispatched
  # rightsize-advisor (run 29858154679, success) → "Posted advisory to Discord ops
  # webhook." Gate dropped so sync-ci-secrets keeps this converged from op.
  - op_ref: op://Goldberry Grove - Admin/Grove Infra/discord_webhook_url
    repo:   EngineeringMoonBear/AgenticOS
    name:   DISCORD_WEBHOOK_URL

  # ── grove-sites: preview pipeline secrets (GOL-145) — SELF-SERVE READY ──────
  # The Grove Infra PAT has proven secrets:write here. Fill each op_ref with the
  # confirmed 1Password source and drop the `gate:` line to sync. Names below are
  # the 9 the preview workflow reads (see GOL-145). Left gated until each op_ref
  # is confirmed to avoid pushing a wrong/empty value over a good one.
  - op_ref: op://Goldberry Grove - Admin/Grove Infra/do_token
    repo:   Goldberry-Playground/grove-sites
    name:   DIGITALOCEAN_TOKEN
    gate:   "confirm op_ref maps to the token grove-sites preview expects before enabling (GOL-145)"
