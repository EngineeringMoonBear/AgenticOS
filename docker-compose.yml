# AgenticOS — Docker Compose stack.
#
# Cloud-init copies this file from /opt/agenticos/repo/docker-compose.yml to
# /opt/agenticos/docker-compose.yml and runs `docker compose up -d` with
# /opt/agenticos/.env (which holds AGENTICOS_DB_PASSWORD, generated on first boot).
#
# Current services:
#   - agenticos-db (pgvector/pg15) — Postgres backing the cost-telemetry tables
#     (task / session / call rows). pgvector image is retained even though we
#     no longer need vector ops here, because dropping it would require image
#     reconfig and the disk footprint is negligible.
#
# Native host services (NOT in this compose file, see cloud-init):
#   - Codex CLI — invoked as subprocess by Paperclip agents
#   - Claude Code — kept installed for fallback, not in default routing

services:
  agenticos-db:
    image: pgvector/pgvector:pg15
    container_name: agenticos-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: agenticos
      POSTGRES_USER: agenticos
      POSTGRES_PASSWORD: ${AGENTICOS_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - agenticos-db-data:/var/lib/postgresql/data
    # Bind on the agenticos VPC interface (10.116.16.2) so the dashboard on
    # DigitalOcean App Platform can reach Postgres over the private VPC.
    # Droplet-local consumers (paperclip-server) reach it via the
    # docker-compose network hostname `agenticos-db:5432`, not this host
    # mapping. The VPC is private (10.116.16.0/20) and UFW gates :5432 to that
    # range, so this is not a public exposure. (Was 127.0.0.1 under the v1
    # assumption that the dashboard ran on the Droplet; corrected when the
    # dashboard moved to App Platform — see the memory-vault-server spec.)
    ports:
      - "10.116.16.2:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticos -d agenticos"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Bind to localhost only — other compose services (OpenViking,
    # paperclip-server) reach it on the docker-compose network at
    # `http://ollama:11434`. UFW belt-and-suspenders blocks public traffic
    # regardless.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # Inside the container, listen on all interfaces so the docker-compose
      # network can route to it. Host-side port mapping above is what controls
      # external reachability.
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    healthcheck:
      test: ["CMD-SHELL", "ollama --version > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # OpenViking — agent-native memory store. Verified schema (see
  # openviking-config/README.md): ov.conf is JSON, top-level model
  # OpenVikingConfig, all sub-models extra="forbid". The container's entrypoint
  # (`openviking-entrypoint`) waits for /app/.openviking/ov.conf to exist
  # before launching openviking-server, so the bind-mount must include the
  # file before the container becomes healthy.
  #
  # Layout:
  #   - /opt/vault            → /app/vault            (Syncthing-paired memory root)
  #   - /opt/agenticos/openviking-config/ov.conf
  #                           → /app/.openviking/ov.conf  (read-only config file)
  #   - openviking-data (named volume)
  #                           → /app/.openviking/data (hot sqlite + vectordb)
  #
  # Embeddings hit the sibling `ollama` service over the docker-compose
  # network at http://ollama:11434 — see `embedding.dense.api_base` in
  # ov.conf. nomic-embed-text is pre-pulled by cloud-init.
  openviking:
    image: ghcr.io/volcengine/openviking:v0.3.19
    container_name: openviking
    restart: unless-stopped
    # Bind on the agenticos VPC interface (10.116.16.2) so App Platform's
    # dashboard can reach Viking over the private VPC. paperclip-server reaches
    # it via the compose-network hostname `openviking:1933`. UFW gates :1933 to
    # 10.116.16.0/20. (Was 127.0.0.1 pre-App-Platform pivot.)
    ports:
      - "10.116.16.2:1933:1933"
    volumes:
      - /opt/vault:/app/vault
      - /opt/agenticos/openviking-config/ov.conf:/app/.openviking/ov.conf:ro
      - openviking-data:/app/.openviking/data
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENVIKING_CONFIG_FILE: /app/.openviking/ov.conf
      OPENVIKING_WITH_BOT: "0"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # vault-server — exposes the human Obsidian vault (/opt/vault, Syncthing-
  # paired from the Mac) over HTTP to the App Platform dashboard. The Memory
  # tab reads THIS, not OpenViking (OpenViking is the agent's separate context
  # brain). Built from infra/vault-server/ (esbuild-bundled, single server.cjs).
  #
  # Bound on the VPC interface 10.116.16.2:7779 (host) -> 7777 (container). The
  # dashboard reaches this via VAULT_SERVER_URL=http://10.116.16.2:7779.
  # ---------------------------------------------------------------------------
  vault-server:
    build:
      context: .
      dockerfile: infra/vault-server/Dockerfile
    image: agenticos/vault-server:local
    container_name: vault-server
    restart: unless-stopped
    # Run as the host `deploy` user (uid:gid 1000:1000) that owns /opt/vault.
    # The image's built-in `app` user is 1001, so it could read the
    # world-readable vault but not WRITE the deploy-owned inbox (EACCES on the
    # discard archive). Matching the host uid grants inbox writes while wiki/
    # stays unwritable — that block is the :ro mount (kernel-enforced), which
    # is independent of uid. Also lets the entrypoint read the deploy-owned
    # Syncthing config.xml for /recent-changes.
    user: "1000:1000"
    ports:
      - "10.116.16.2:7779:7777"
    extra_hosts:
      # Lets the container resolve the Droplet host, where Syncthing's REST API
      # listens on 0.0.0.0:8384, for the /recent-changes endpoint.
      - "host.docker.internal:host-gateway"
    volumes:
      # Whole vault is read-only to the cloud…
      - /opt/vault:/app/vault:ro
      # …except the inbox quarantine, which vault-server may write (discard →
      # inbox/archived/). wiki/ and sources/ stay physically unwritable.
      - /opt/vault/inbox:/app/vault/inbox:rw
      # Syncthing config (read-only) — Phase E reads the API key from here
      # to poll Syncthing's REST API for recent-changes. Path verified on the
      # live Droplet: newer Syncthing stores config under XDG state, not
      # ~/.config (config.xml lives at ~/.local/state/syncthing/config.xml).
      - /home/deploy/.local/state/syncthing:/syncthing-config:ro
    environment:
      VAULT_ROOT: /app/vault
      PORT: 7777
      # The Syncthing-paired Obsidian vault (synced to /opt/vault) organizes
      # curated pages under wiki/<category> per the vault's CLAUDE.md charter,
      # with inbox/ (quarantine capture) and sources/ (raw inputs) as siblings.
      # So the wiki page root is wiki/ — the store's default. inbox/ is read
      # separately; sources/ and dotfolders stay out of the curated page tree.
      WIKI_SUBDIR: "wiki"
      # Syncthing REST for /recent-changes. The container reaches the host's
      # Syncthing (bound 0.0.0.0:8384) via host.docker.internal (see extra_hosts).
      # The API key is injected by the entrypoint below from the bind-mounted
      # config.xml. An unreachable Syncthing degrades /recent-changes to
      # {available:false} rather than erroring.
      SYNCTHING_URL: "http://host.docker.internal:8384"
      # Primary source: /opt/agenticos/.env on the Droplet. The bind-mounted
      # config.xml is 0600 deploy-owned and unreadable by the container's
      # non-root user, so the entrypoint below only overrides this when it can
      # actually read a key — otherwise this .env value wins.
      SYNCTHING_API_KEY: ${SYNCTHING_API_KEY:-}
    # If the read-only config mount is readable, extract the key from it;
    # otherwise keep the env-provided key (don't clobber it with an empty read).
    # Then launch the bundled server (server.cjs at WORKDIR /app). $$ escapes $
    # so the container shell — not compose — evaluates the subshell.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /syncthing-config/config.xml ]; then
          KEY="$$(grep -oP '(?<=<apikey>)[^<]+' /syncthing-config/config.xml 2>/dev/null | head -1)"
          if [ -n "$$KEY" ]; then export SYNCTHING_API_KEY="$$KEY"; fi
        fi
        exec node server.cjs
    healthcheck:
      # Node 22 has global fetch; the bundled image ships no curl. Hits the
      # container-internal port 7777 (not the 7779 host mapping).
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:7777/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # paperclip-server — Paperclip multi-agent runtime. Built from the
  # EngineeringMoonBear/paperclip fork (cloned to /opt/paperclip on the Droplet,
  # or vendor/paperclip locally). Auto-migrates its 80+ table Drizzle schema
  # into the shared agenticos-db on first boot.
  #
  # Deployment mode: local_trusted (no auth — Cloudflare Access is the
  # perimeter gate). Binds on the VPC interface so App Platform can reach it.
  #
  # Plugins: vault-plugin and openviking-plugin dist/ directories are
  # bind-mounted read-only into PAPERCLIP_HOME/plugins/.
  # ---------------------------------------------------------------------------
  paperclip-server:
    build:
      context: /opt/paperclip
      dockerfile: Dockerfile
    container_name: paperclip-server
    restart: unless-stopped
    ports:
      - "10.116.16.2:3100:3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      # Dedicated database (NOT the shared agenticos DB): Paperclip uses Drizzle
      # auto-migrations, which refuse to run against a non-empty DB they didn't
      # initialize. A separate `paperclip` DB also decouples it from the legacy
      # Hermes tables. The bootstrap creates this DB (CREATE DATABASE paperclip).
      DATABASE_URL: postgresql://agenticos:${AGENTICOS_DB_PASSWORD}@agenticos-db:5432/paperclip
      # `authenticated` + `private`: login required, binds non-loopback (HOST
      # 0.0.0.0 = "lan"), reachable over the VPC/Tailscale. `local_trusted`
      # cannot be used here — it requires loopback binding, which breaks the
      # VPC port mapping and Docker service-name DNS.
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      # Public hostname the board UI is served behind (Cloudflare Access +
      # cloudflared tunnel; see infra/terraform/cloudflare-tunnel.tf). better-auth
      # reads this as its canonical base URL so cookie domain, CSRF trustedOrigins,
      # and redirects are correct behind the proxy — without it, baseUrlMode stays
      # "auto" and login loops behind the reverse proxy. Also auto-allowlists the
      # hostname (config.ts publicUrlHostname), so it doesn't need a separate
      # PAPERCLIP_ALLOWED_HOSTNAMES entry. Static + non-secret, so it lives here
      # (environment: overrides env_file:) rather than in .env. EXPOSURE stays
      # `private`: the listening socket never faces the internet — only the tunnel
      # reaches it — so the public-exposure startup guard does not apply.
      PAPERCLIP_PUBLIC_URL: https://paperclip.gatheringatthegrove.com
      PAPERCLIP_HOME: /paperclip
      SERVE_UI: "true"
      # Session/JWT signing secret for authenticated mode (high-entropy; from
      # .env / 1Password). Stable across reprovisions, else sessions + agent
      # JWTs are invalidated on every restart.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      # LLM API keys are intentionally NOT passed in the shared container env.
      # Every agent runs as a subprocess of this server and would inherit them
      # (and env_file below dumps all of /opt/agenticos/.env in regardless), so a
      # prompt-injected agent could exfiltrate any key here. Grant LLM keys
      # PER-AGENT via Paperclip Secrets instead — they resolve into only that
      # agent's adapterEnv, merged after the sanitized base env. See
      # docs/runbooks/paperclip-agent-backends.md (Agent environment isolation).
      #
      #   - ANTHROPIC: claude_local runs on the Claude Max SUBSCRIPTION (OAuth via
      #     `claude /login`; creds persist on the paperclip-data volume at
      #     /paperclip/.claude). An ANTHROPIC_API_KEY in env would override OAuth
      #     and silently switch Claude agents to pay-per-token billing.
      #   - OPENAI / DEEPSEEK: codex_local / deepseek agents get their key
      #     per-agent (was previously global here — moved out for least privilege).
      #
      # IMPORTANT: keeping them out of this block is necessary but not sufficient —
      # env_file below loads /opt/agenticos/.env, which must ALSO have no
      # ANTHROPIC_API_KEY / OPENAI_API_KEY / DEEPSEEK_API_KEY lines, or they are
      # injected directly and bypass this block. See the runbook for the safe
      # ordering (grant per-agent BEFORE removing from .env).
      # Pin claude_local's credential/config dir onto the persistent
      # paperclip-data volume (/paperclip), at one path that BOTH the
      # server-spawned agent processes AND `docker compose exec … claude /login`
      # resolve to. Without it, claude finds its config via the home dir, which
      # (a) differs between a root `exec` shell and the gosu-node runtime, and
      # (b) can land off-volume (e.g. /home/node/.claude) and vanish on recreate
      # — exactly why a login "succeeded" but agents still saw "login required".
      # With it pinned, log in ONCE (as node) and it persists across restarts.
      CLAUDE_CONFIG_DIR: /paperclip/.claude
      # NOTE: plugin config (GitHub token, OpenViking key/endpoint, vault URL)
      # is NOT passed via env. Paperclip sandboxes plugin workers away from the
      # host process.env, so the previous OPENVIKING_*/VAULT_SERVER_URL/GITHUB_*
      # vars here were dead. Plugins read their config via ctx.config; values
      # are pushed from 1Password by scripts/sync-paperclip-secrets.sh.
      TZ: America/New_York
      # GitHub App auth — via the gh-token-broker sidecar. The App private key
      # lives ONLY in the broker (loaded from a separate chmod-600 secret file),
      # NOT in this container's env — so agent subprocesses that inherit it can't
      # exfiltrate the key. The git credential helper (scripts/agent-git) asks the
      # broker over the compose network for short-lived, repo-scoped tokens.
      GH_TOKEN_BROKER_URL: http://gh-token-broker:9099
    volumes:
      - paperclip-data:/paperclip
      - /opt/vault:/opt/vault:ro
      - ./packages/vault-plugin:/paperclip/plugins/vault-plugin:ro
      - ./packages/openviking-plugin:/paperclip/plugins/openviking-plugin:ro
      - ./packages/github-plugin:/paperclip/plugins/github-plugin:ro
      - ./packages/github-sync-plugin:/paperclip/plugins/github-sync-plugin:ro
      # Shared agent house-rules (internal API endpoint + local Obsidian vault).
      # Reference it from each agent's adapterConfig.instructionsFilePath =
      # /paperclip/agent-house-rules.md so it's prepended to every run.
      - ./docs/agent-house-rules.md:/paperclip/agent-house-rules.md:ro
      # GitHub App credential helper + git identity (mounted to the node user's
      # $HOME/.gitconfig). Routes github.com auth through the App.
      - ./scripts/agent-git:/paperclip/agent-git:ro
      - ./scripts/agent-git/gitconfig:/paperclip/.gitconfig:ro
    env_file:
      - /opt/agenticos/.env
    depends_on:
      agenticos-db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      openviking:
        condition: service_healthy
      vault-server:
        condition: service_healthy
      gh-token-broker:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  # cloudflared — outbound-only connector that publishes paperclip-server's board
  # UI at paperclip.gatheringatthegrove.com behind Cloudflare Access (Google SSO).
  # The named tunnel, its ingress rules, the Access app/policy, and the DNS record
  # are all Terraform-managed (infra/terraform/cloudflare-tunnel.tf); this service
  # just runs the connector with the run token.
  #
  # No published ports: the tunnel dials OUT to Cloudflare's edge over 443, so
  # nothing new is exposed inbound. Because it shares this compose network, its
  # origin is the internal Docker DNS name paperclip-server:3100 (set as the
  # ingress service in Terraform) — it does not depend on the host VPC port map
  # or ufw. PAPERCLIP_TUNNEL_TOKEN comes from /opt/agenticos/.env (1Password →
  # secret-sync); see docs/runbooks/paperclip-cloudflare-access.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-paperclip
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${PAPERCLIP_TUNNEL_TOKEN:-}
    env_file:
      - /opt/agenticos/.env
    depends_on:
      paperclip-server:
        condition: service_healthy

  # gh-token-broker — holds the GitHub App private key and mints short-lived,
  # repo-scoped installation tokens over the internal compose network. It is the
  # ONLY container with the key: it loads GITHUB_APP_PRIVATE_KEY_B64 from a
  # separate chmod-600 secret file (NOT /opt/agenticos/.env), so paperclip-server
  # and its agent subprocesses never see the key — they ask this broker for
  # scoped tokens via the credential helper (GH_TOKEN_BROKER_URL). Runs the same
  # scripts/agent-git/github-app-token.mjs in `serve` mode. No published ports.
  gh-token-broker:
    image: node:22-slim
    container_name: gh-token-broker
    restart: unless-stopped
    command: ["node", "/app/github-app-token.mjs", "serve"]
    environment:
      GITHUB_APP_ID: "4134853"
      PORT: "9099"
    env_file:
      # Broker-only secret: GITHUB_APP_PRIVATE_KEY_B64. Created on the Droplet
      # (chmod 600) and REMOVED from /opt/agenticos/.env — see the runbook.
      - /opt/agenticos/secrets/gh-app.env
    volumes:
      - ./scripts/agent-git:/app:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9099/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  agenticos-db-data:
  ollama-models:
  openviking-data:
  paperclip-data:
