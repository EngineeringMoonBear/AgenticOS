# AgenticOS — Docker Compose stack.
#
# Cloud-init copies this file from /opt/agenticos/repo/docker-compose.yml to
# /opt/agenticos/docker-compose.yml and runs `docker compose up -d` with
# /opt/agenticos/.env (which holds AGENTICOS_DB_PASSWORD, generated on first boot).
#
# Current services:
#   - agenticos-db (pgvector/pg15) — Postgres backing the cost-telemetry tables
#     (task / session / call rows). pgvector image is retained even though we
#     no longer need vector ops here, because dropping it would require image
#     reconfig and the disk footprint is negligible.
#
# Native host services (NOT in this compose file, see cloud-init):
#   - Hermes Agent — Python service on localhost:7777, orchestrator
#     (will move to compose in a later task)
#   - Codex CLI — invoked as subprocess by a Hermes skill
#   - Claude Code — kept installed for fallback, not in default routing
#
# Why some things are in compose and others aren't:
# Hermes/OpenViking benefit from native filesystem access (vault, logs) and
# don't gain from containerization. Postgres and Ollama benefit from data-volume
# isolation, restart policies, and not interfering with system services.

services:
  agenticos-db:
    image: pgvector/pgvector:pg15
    container_name: agenticos-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: agenticos
      POSTGRES_USER: agenticos
      POSTGRES_PASSWORD: ${AGENTICOS_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - agenticos-db-data:/var/lib/postgresql/data
    # Bind to localhost only — never expose Postgres to the network. Hermes
    # and the dashboard's API routes connect via 127.0.0.1.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticos -d agenticos"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Bind to localhost only — Hermes (another compose service in Spec 1) will
    # reach it on the docker-compose network at `http://ollama:11434`. UFW
    # belt-and-suspenders blocks public traffic regardless.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # Inside the container, listen on all interfaces so the docker-compose
      # network can route to it. Host-side port mapping above is what controls
      # external reachability.
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    healthcheck:
      test: ["CMD-SHELL", "ollama --version > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # OpenViking — agent-native memory store. Verified schema (see
  # openviking-config/README.md): ov.conf is JSON, top-level model
  # OpenVikingConfig, all sub-models extra="forbid". The container's entrypoint
  # (`openviking-entrypoint`) waits for /app/.openviking/ov.conf to exist
  # before launching openviking-server, so the bind-mount must include the
  # file before the container becomes healthy.
  #
  # Layout:
  #   - /opt/vault            → /app/vault            (Syncthing-paired memory root)
  #   - /opt/agenticos/openviking-config/ov.conf
  #                           → /app/.openviking/ov.conf  (read-only config file)
  #   - openviking-data (named volume)
  #                           → /app/.openviking/data (hot sqlite + vectordb)
  #
  # Embeddings hit the sibling `ollama` service over the docker-compose
  # network at http://ollama:11434 — see `embedding.dense.api_base` in
  # ov.conf. nomic-embed-text is pre-pulled by cloud-init.
  openviking:
    image: ghcr.io/volcengine/openviking:v0.3.19
    container_name: openviking
    restart: unless-stopped
    ports:
      - "127.0.0.1:1933:1933"
    volumes:
      - /opt/vault:/app/vault
      - /opt/agenticos/openviking-config/ov.conf:/app/.openviking/ov.conf:ro
      - openviking-data:/app/.openviking/data
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENVIKING_CONFIG_FILE: /app/.openviking/ov.conf
      OPENVIKING_WITH_BOT: "0"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  agenticos-db-data:
  ollama-models:
  openviking-data:
