# AgenticOS — Docker Compose stack.
#
# Cloud-init copies this file from /opt/agenticos/repo/docker-compose.yml to
# /opt/agenticos/docker-compose.yml and runs `docker compose up -d` with
# /opt/agenticos/.env (which holds AGENTICOS_DB_PASSWORD, generated on first boot).
#
# Current services:
#   - agenticos-db (pgvector/pg15) — Postgres backing the cost-telemetry tables
#     (task / session / call rows). pgvector image is retained even though we
#     no longer need vector ops here, because dropping it would require image
#     reconfig and the disk footprint is negligible.
#
# Native host services (NOT in this compose file, see cloud-init):
#   - Codex CLI — invoked as subprocess by a Hermes skill (Task 13)
#   - Claude Code — kept installed for fallback, not in default routing

services:
  agenticos-db:
    image: pgvector/pgvector:pg15
    container_name: agenticos-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: agenticos
      POSTGRES_USER: agenticos
      POSTGRES_PASSWORD: ${AGENTICOS_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - agenticos-db-data:/var/lib/postgresql/data
    # Bind on the agenticos VPC interface (10.116.16.2) so the dashboard on
    # DigitalOcean App Platform can reach Postgres over the private VPC.
    # Droplet-local consumers (Hermes, inbox-watcher) reach it via the
    # docker-compose network hostname `agenticos-db:5432`, not this host
    # mapping. The VPC is private (10.116.16.0/20) and UFW gates :5432 to that
    # range, so this is not a public exposure. (Was 127.0.0.1 under the v1
    # assumption that the dashboard ran on the Droplet; corrected when the
    # dashboard moved to App Platform — see the memory-vault-server spec.)
    ports:
      - "10.116.16.2:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticos -d agenticos"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Bind to localhost only — Hermes (another compose service in Spec 1) will
    # reach it on the docker-compose network at `http://ollama:11434`. UFW
    # belt-and-suspenders blocks public traffic regardless.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # Inside the container, listen on all interfaces so the docker-compose
      # network can route to it. Host-side port mapping above is what controls
      # external reachability.
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    healthcheck:
      test: ["CMD-SHELL", "ollama --version > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # OpenViking — agent-native memory store. Verified schema (see
  # openviking-config/README.md): ov.conf is JSON, top-level model
  # OpenVikingConfig, all sub-models extra="forbid". The container's entrypoint
  # (`openviking-entrypoint`) waits for /app/.openviking/ov.conf to exist
  # before launching openviking-server, so the bind-mount must include the
  # file before the container becomes healthy.
  #
  # Layout:
  #   - /opt/vault            → /app/vault            (Syncthing-paired memory root)
  #   - /opt/agenticos/openviking-config/ov.conf
  #                           → /app/.openviking/ov.conf  (read-only config file)
  #   - openviking-data (named volume)
  #                           → /app/.openviking/data (hot sqlite + vectordb)
  #
  # Embeddings hit the sibling `ollama` service over the docker-compose
  # network at http://ollama:11434 — see `embedding.dense.api_base` in
  # ov.conf. nomic-embed-text is pre-pulled by cloud-init.
  openviking:
    image: ghcr.io/volcengine/openviking:v0.3.19
    container_name: openviking
    restart: unless-stopped
    # Bind on the agenticos VPC interface (10.116.16.2) so App Platform's
    # dashboard can reach Viking over the private VPC. Hermes reaches it via
    # the compose-network hostname `openviking:1933`. UFW gates :1933 to
    # 10.116.16.0/20. (Was 127.0.0.1 pre-App-Platform pivot.)
    ports:
      - "10.116.16.2:1933:1933"
    volumes:
      - /opt/vault:/app/vault
      - /opt/agenticos/openviking-config/ov.conf:/app/.openviking/ov.conf:ro
      - openviking-data:/app/.openviking/data
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENVIKING_CONFIG_FILE: /app/.openviking/ov.conf
      OPENVIKING_WITH_BOT: "0"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Hermes Agent — headless orchestrator. The container's entrypoint normally
  # exec's `hermes` (interactive chat), which is useless in a daemonized
  # docker-compose service. We override `command:` to run the web dashboard
  # instead — that's the HTTP surface (FastAPI app in hermes_cli/web_server.py)
  # that exposes /api/status, /api/cron/jobs, /api/skills, /api/sessions, …
  # so the Hermes process IS the long-lived foreground service.
  #
  # --host 0.0.0.0 + --insecure: dashboard refuses non-loopback binds without
  # --insecure because it exposes API-key management endpoints. The Docker
  # port mapping below (127.0.0.1:7777:7777) keeps the actual host listener
  # on loopback, and UFW double-checks that. Inside the container, 0.0.0.0
  # is needed so the docker-compose network can reach it.
  #
  # --no-open: there's no browser inside the container, so the auto-open
  # heuristic would just log a warning. --skip-build: web_dist/ is already
  # pre-built into the image (verified: /opt/hermes/hermes_cli/web_dist/
  # contains index.html + assets/), so npm is not required at runtime.
  #
  # Config bootstrap: the entrypoint copies cli-config.yaml.example into
  # $HERMES_HOME/config.yaml ONLY IF the file is missing. We bind-mount our
  # config.yaml read-only over that path so our settings take effect from
  # the very first container start, with no copy step needed. Mounting under
  # /opt/agenticos/ on the host (populated by cloud-init from this repo's
  # hermes-config/ directory) keeps the path stable across repo re-clones.
  #
  # OpenViking memory provider: the openviking plugin in Hermes reads
  # OPENVIKING_ENDPOINT and OPENVIKING_API_KEY from the process env. We set
  # the endpoint to the sibling compose-network hostname; the API key is
  # already in /opt/agenticos/.env (loaded via env_file:) as
  # OPENVIKING_ROOT_API_KEY, so we re-export it as OPENVIKING_API_KEY to
  # match the plugin's expected variable name.
  hermes-agent:
    # Locally-built overlay image: nousresearch/hermes-agent:main + our
    # agenticos-hermes package pip-installed into its venv so hook plugins
    # (cost-recorder etc.) can `import agenticos_hermes`. See
    # packages/agenticos-hermes/wrappers/hermes-agent/Dockerfile for the
    # build steps and rationale. Image tag is LOCAL ONLY — never pushed to
    # any public registry.
    #
    # Context matches inbox-watcher's (./packages/agenticos-hermes) so the
    # /opt/agenticos/packages → /opt/agenticos/repo/packages symlink doesn't
    # cross the build-context boundary (BuildKit forbids that).
    build:
      context: ./packages/agenticos-hermes
      dockerfile: wrappers/hermes-agent/Dockerfile
    image: agenticos/hermes-agent:local
    container_name: hermes-agent
    restart: unless-stopped
    command:
      - dashboard
      - --host
      - "0.0.0.0"
      - --port
      - "7777"
      - --no-open
      - --insecure
      - --skip-build
    ports:
      - "127.0.0.1:7777:7777"
    volumes:
      - hermes-data:/opt/data
      - /opt/vault:/opt/vault
      - /opt/agenticos/hermes-config/config.yaml:/opt/data/config.yaml:ro
      # Phase 1.1 cost-recorder hook plugin — bind-mounted read-only so the
      # plugin code (packages/agenticos-hermes/plugins/cost-recorder/) is
      # discovered by Hermes's plugin loader at /opt/hermes/plugins/. See
      # PR #66 for the plugin contract (post_llm_call + on_session_end).
      - ./packages/agenticos-hermes/plugins/cost-recorder:/opt/hermes/plugins/cost-recorder:ro
      # Phase 1.4 cron-script wrappers — Hermes resolves --script paths under
      # $HERMES_HOME/scripts/ (= /opt/data/scripts/). Mounted here AND in
      # the gateway sidecar below so both containers see the same scripts.
      - ./packages/agenticos-hermes/wrappers/cron-scripts:/opt/data/scripts:ro
      # NOTE: we deliberately do NOT bind-mount /opt/agenticos/.env into the
      # container. The entrypoint passes the file through python-dotenv as
      # the `hermes` user (UID 10000), which can't read the host-side file
      # (owned by deploy UID 1000, chmod 600). `env_file:` below already
      # injects the same key/value pairs into the process env, which is what
      # Hermes actually consumes — duplicating via bind-mount adds nothing.
    environment:
      HERMES_HOME: /opt/data
      # Postgres DSN — the cost-telemetry skill (Task 11+) will read this to
      # write `calls` rows. Hermes itself doesn't connect to PG yet; this is
      # just the canonical env-var name so skills inherit it without further
      # plumbing.
      AGENTICOS_DB_URL: postgresql://agenticos:${AGENTICOS_DB_PASSWORD}@agenticos-db:5432/agenticos
      # OpenViking memory provider plugin config — see
      # plugins/memory/openviking/__init__.py inside the image for the contract.
      OPENVIKING_ENDPOINT: http://openviking:1933
      OPENVIKING_API_KEY: ${OPENVIKING_ROOT_API_KEY}
      OPENVIKING_ACCOUNT: agenticos
      OPENVIKING_USER: deploy
      OPENVIKING_AGENT: hermes
      # Cron expressions in jobs.json are interpreted in this TZ. Spec 1 §13
      # locked America/New_York. Keep the same value on hermes-gateway below
      # — they share the jobs.json file via the hermes-data volume.
      TZ: America/New_York
    env_file:
      - /opt/agenticos/.env
    depends_on:
      agenticos-db:
        condition: service_healthy
      openviking:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      # Use Python (always present in the image) for the healthcheck because
      # the slim Debian base does NOT ship curl. urlopen is enough for a
      # liveness probe; we don't need to parse the JSON body.
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:7777/api/status', timeout=5); sys.exit(0)"
      interval: 15s
      timeout: 10s
      retries: 5
      # Hermes ships Playwright + a full venv, so cold-start (entrypoint
      # bootstrap, gosu drop, dashboard FastAPI startup) takes ~20-40 s.
      start_period: 90s

  # ---------------------------------------------------------------------------
  # hermes-gateway — Hermes's cron scheduler tick daemon. The dashboard
  # subcommand (running in hermes-agent above) serves the REST API but does
  # NOT tick the scheduler. The gateway subcommand does, ticking jobs.json
  # every 60s. We run both: the dashboard for human/dashboard access, the
  # gateway for actually firing cron jobs.
  #
  # They share /opt/data (the hermes-data volume) so they see the same
  # jobs.json + cron logs. The gateway also needs the cost-recorder plugin
  # bind-mount because cron tasks make LLM calls that the hook should record.
  #
  # Image is the same overlay built for hermes-agent (agenticos/hermes-agent:local)
  # so our agenticos_hermes Python package is present for cron-task subprocesses.
  # ---------------------------------------------------------------------------
  hermes-gateway:
    image: agenticos/hermes-agent:local
    container_name: hermes-gateway
    restart: unless-stopped
    # `gateway run` is the foreground variant (recommended for Docker). It
    # ticks the scheduler every 60s. --accept-hooks silences the interactive
    # approval prompt that gateway shows for unseen shell hooks; we're
    # running in a non-TTY container so the prompt would hang anyway.
    command:
      - gateway
      - run
      - --accept-hooks
    volumes:
      # Same volumes as hermes-agent so cron's jobs.json + plugin code +
      # cost-recorder + script wrappers are all consistent across containers.
      - hermes-data:/opt/data
      - /opt/vault:/opt/vault
      - /opt/agenticos/hermes-config/config.yaml:/opt/data/config.yaml:ro
      - ./packages/agenticos-hermes/plugins/cost-recorder:/opt/hermes/plugins/cost-recorder:ro
      - ./packages/agenticos-hermes/wrappers/cron-scripts:/opt/data/scripts:ro
    environment:
      HERMES_HOME: /opt/data
      AGENTICOS_DB_URL: postgresql://agenticos:${AGENTICOS_DB_PASSWORD}@agenticos-db:5432/agenticos
      OPENVIKING_ENDPOINT: http://openviking:1933
      OPENVIKING_API_KEY: ${OPENVIKING_ROOT_API_KEY}
      OPENVIKING_ACCOUNT: agenticos
      OPENVIKING_USER: deploy
      OPENVIKING_AGENT: hermes
      TZ: America/New_York
    env_file:
      - /opt/agenticos/.env
    depends_on:
      hermes-agent:
        condition: service_healthy
    healthcheck:
      # Gateway has no HTTP surface; use a process-presence check via pgrep
      # inside the container. Hermes gateway runs as a Python process whose
      # cmdline contains "gateway run" — sufficient signal that the tick
      # loop is alive.
      test: ["CMD-SHELL", "pgrep -f 'hermes.*gateway.*run' > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # inbox-watcher — standalone daemon (NOT a Hermes plugin) that watches
  # /opt/vault/inbox/ for stable .md files and shells out to the
  # `agenticos_hermes.tasks.inbox_triage` module. See
  # packages/agenticos-hermes/daemons/inbox-watcher/ for the implementation.
  # ---------------------------------------------------------------------------
  inbox-watcher:
    build:
      context: ./packages/agenticos-hermes
      dockerfile: daemons/inbox-watcher/Dockerfile
    container_name: inbox-watcher
    restart: unless-stopped
    volumes:
      - /opt/vault:/opt/vault
    environment:
      AGENTICOS_DB_URL: postgresql://agenticos:${AGENTICOS_DB_PASSWORD}@agenticos-db:5432/agenticos
      OLLAMA_ENDPOINT: http://ollama:11434
      OPENVIKING_ENDPOINT: http://openviking:1933
      OPENVIKING_ROOT_API_KEY: ${OPENVIKING_ROOT_API_KEY}
    env_file:
      - /opt/agenticos/.env
    depends_on:
      agenticos-db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # vault-server — exposes the human Obsidian vault (/opt/vault, Syncthing-
  # paired from the Mac) over HTTP to the App Platform dashboard. The Memory
  # tab reads THIS, not OpenViking (OpenViking is the agent's separate context
  # brain). Built from infra/vault-server/ (esbuild-bundled, single server.cjs).
  #
  # Bound on the VPC interface 10.116.16.2:7779 (host) -> 7777 (container). Port
  # 7779 chosen because hermes-agent already owns 7777 on loopback. The
  # dashboard reaches this via VAULT_SERVER_URL=http://10.116.16.2:7779.
  # ---------------------------------------------------------------------------
  vault-server:
    build:
      context: .
      dockerfile: infra/vault-server/Dockerfile
    image: agenticos/vault-server:local
    container_name: vault-server
    restart: unless-stopped
    # Run as the host `deploy` user (uid:gid 1000:1000) that owns /opt/vault.
    # The image's built-in `app` user is 1001, so it could read the
    # world-readable vault but not WRITE the deploy-owned inbox (EACCES on the
    # discard archive). Matching the host uid grants inbox writes while wiki/
    # stays unwritable — that block is the :ro mount (kernel-enforced), which
    # is independent of uid. Also lets the entrypoint read the deploy-owned
    # Syncthing config.xml for /recent-changes.
    user: "1000:1000"
    ports:
      - "10.116.16.2:7779:7777"
    extra_hosts:
      # Lets the container resolve the Droplet host, where Syncthing's REST API
      # listens on 0.0.0.0:8384, for the /recent-changes endpoint.
      - "host.docker.internal:host-gateway"
    volumes:
      # Whole vault is read-only to the cloud…
      - /opt/vault:/app/vault:ro
      # …except the inbox quarantine, which vault-server may write (discard →
      # inbox/archived/). wiki/ and sources/ stay physically unwritable.
      - /opt/vault/inbox:/app/vault/inbox:rw
      # Syncthing config (read-only) — Phase E reads the API key from here
      # to poll Syncthing's REST API for recent-changes. Path verified on the
      # live Droplet: newer Syncthing stores config under XDG state, not
      # ~/.config (config.xml lives at ~/.local/state/syncthing/config.xml).
      - /home/deploy/.local/state/syncthing:/syncthing-config:ro
    environment:
      VAULT_ROOT: /app/vault
      PORT: 7777
      # The Syncthing-paired Obsidian vault (synced to /opt/vault) organizes
      # curated pages under wiki/<category> per the vault's CLAUDE.md charter,
      # with inbox/ (quarantine capture) and sources/ (raw inputs) as siblings.
      # So the wiki page root is wiki/ — the store's default. inbox/ is read
      # separately; sources/ and dotfolders stay out of the curated page tree.
      WIKI_SUBDIR: "wiki"
      # Syncthing REST for /recent-changes. The container reaches the host's
      # Syncthing (bound 0.0.0.0:8384) via host.docker.internal (see extra_hosts).
      # The API key is injected by the entrypoint below from the bind-mounted
      # config.xml. An unreachable Syncthing degrades /recent-changes to
      # {available:false} rather than erroring.
      SYNCTHING_URL: "http://host.docker.internal:8384"
      # Primary source: /opt/agenticos/.env on the Droplet. The bind-mounted
      # config.xml is 0600 deploy-owned and unreadable by the container's
      # non-root user, so the entrypoint below only overrides this when it can
      # actually read a key — otherwise this .env value wins.
      SYNCTHING_API_KEY: ${SYNCTHING_API_KEY:-}
    # If the read-only config mount is readable, extract the key from it;
    # otherwise keep the env-provided key (don't clobber it with an empty read).
    # Then launch the bundled server (server.cjs at WORKDIR /app). $$ escapes $
    # so the container shell — not compose — evaluates the subshell.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /syncthing-config/config.xml ]; then
          KEY="$$(grep -oP '(?<=<apikey>)[^<]+' /syncthing-config/config.xml 2>/dev/null | head -1)"
          if [ -n "$$KEY" ]; then export SYNCTHING_API_KEY="$$KEY"; fi
        fi
        exec node server.cjs
    healthcheck:
      # Node 22 has global fetch; the bundled image ships no curl. Hits the
      # container-internal port 7777 (not the 7779 host mapping).
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:7777/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # paperclip-server — Paperclip multi-agent runtime. Built from the
  # EngineeringMoonBear/paperclip fork (cloned to /opt/paperclip on the Droplet,
  # or vendor/paperclip locally). Auto-migrates its 80+ table Drizzle schema
  # into the shared agenticos-db on first boot.
  #
  # Deployment mode: local_trusted (no auth — Cloudflare Access is the
  # perimeter gate). Binds on the VPC interface so App Platform can reach it.
  #
  # Plugins: vault-plugin and openviking-plugin dist/ directories are
  # bind-mounted read-only into PAPERCLIP_HOME/plugins/.
  # ---------------------------------------------------------------------------
  paperclip-server:
    build:
      context: /opt/paperclip
      dockerfile: Dockerfile
    container_name: paperclip-server
    restart: unless-stopped
    ports:
      - "10.116.16.2:3100:3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      # Dedicated database (NOT the shared agenticos DB): Paperclip uses Drizzle
      # auto-migrations, which refuse to run against a non-empty DB they didn't
      # initialize. A separate `paperclip` DB also decouples it from the legacy
      # Hermes tables. The bootstrap creates this DB (CREATE DATABASE paperclip).
      DATABASE_URL: postgresql://agenticos:${AGENTICOS_DB_PASSWORD}@agenticos-db:5432/paperclip
      # `authenticated` + `private`: login required, binds non-loopback (HOST
      # 0.0.0.0 = "lan"), reachable over the VPC/Tailscale. `local_trusted`
      # cannot be used here — it requires loopback binding, which breaks the
      # VPC port mapping and Docker service-name DNS.
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_HOME: /paperclip
      SERVE_UI: "true"
      # Session/JWT signing secret for authenticated mode (high-entropy; from
      # .env / 1Password). Stable across reprovisions, else sessions + agent
      # JWTs are invalidated on every restart.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Forwarded to plugins via process.env
      OPENVIKING_ENDPOINT: http://openviking:1933
      OPENVIKING_ROOT_API_KEY: ${OPENVIKING_ROOT_API_KEY}
      OPENVIKING_ACCOUNT: agenticos
      OPENVIKING_USER: deploy
      VAULT_SERVER_URL: http://vault-server:7777
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-EngineeringMoonBear}
      TZ: America/New_York
    volumes:
      - paperclip-data:/paperclip
      - /opt/vault:/opt/vault:ro
      - ./packages/vault-plugin/dist:/paperclip/plugins/vault-plugin:ro
      - ./packages/openviking-plugin/dist:/paperclip/plugins/openviking-plugin:ro
      - ./packages/github-plugin/dist:/paperclip/plugins/github-plugin:ro
    env_file:
      - /opt/agenticos/.env
    depends_on:
      agenticos-db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      openviking:
        condition: service_healthy
      vault-server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

volumes:
  agenticos-db-data:
  ollama-models:
  openviking-data:
  hermes-data:
  paperclip-data:
